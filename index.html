<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow Kanban</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
    .dark .glass { background: rgba(15,23,42,0.8); border-color: rgba(51,65,85,0.5); }
    .task-card { transition: all 0.2s; cursor: grab; }
    .task-card:active { cursor: grabbing; }
    .task-card.dragging { opacity: 0.5; transform: scale(1.02) rotate(2deg); }
    .column-drop { transition: all 0.2s; min-height: 200px; }
    .column-drop.drag-over { background: rgba(59,130,246,0.08); border: 2px dashed rgba(59,130,246,0.3); }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .animate-scale-in { animation: scaleIn 0.2s ease-out; }
    @keyframes scaleIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    .toast { animation: slideUp 0.3s ease-out; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(156,163,175,0.5); border-radius: 20px; }
    .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

  <!-- Navbar -->
  <nav class="sticky top-0 z-40 glass border-b border-gray-200 dark:border-slate-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center text-white shadow-lg shadow-primary-500/30">
            <i class="fa-solid fa-clipboard-list"></i>
          </div>
          <span class="text-xl font-bold bg-gradient-to-r from-primary-600 to-primary-500 bg-clip-text text-transparent">TaskFlow</span>
        </div>
        <div class="hidden md:flex flex-1 max-w-md mx-8">
          <div class="relative w-full">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" id="searchInput" placeholder="Search tasks..." 
              class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all">
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="exportTasks()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 text-gray-600 dark:text-gray-300 transition-colors" title="Export">
            <i class="fa-solid fa-download"></i>
          </button>
          <label class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 text-gray-600 dark:text-gray-300 transition-colors cursor-pointer" title="Import">
            <i class="fa-solid fa-upload"></i>
            <input type="file" id="importFile" accept=".json" class="hidden" onchange="importTasks(this)">
          </label>
          <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 text-gray-600 dark:text-gray-300 transition-colors">
            <i class="fa-solid fa-sun dark:hidden"></i>
            <i class="fa-solid fa-moon hidden dark:block"></i>
          </button>
          <div class="w-px h-6 bg-gray-200 dark:bg-slate-700 mx-1"></div>
          <button onclick="openTaskModal()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg font-medium text-sm transition-colors flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> New Task
          </button>
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary-400 to-primary-600 flex items-center justify-center text-white text-xs font-bold shadow-lg shadow-primary-500/30 ml-1">JD</div>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <!-- Stats Bar -->
    <section id="statsBar" class="mb-6"></section>

    <!-- Filter Bar -->
    <section class="mb-6">
      <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 p-4">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2 text-gray-700 dark:text-gray-300">
            <i class="fa-solid fa-filter text-sm"></i>
            <span class="font-medium text-sm">Filters & Sort</span>
          </div>
          <button onclick="resetFilters()" id="clearFiltersBtn" class="hidden text-xs text-red-500 hover:text-red-600 flex items-center gap-1">
            <i class="fa-solid fa-xmark"></i> Clear filters
          </button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
          <div class="relative sm:hidden">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" id="mobileSearch" placeholder="Search tasks..." 
              class="w-full pl-9 pr-4 py-2 rounded-lg border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20">
          </div>
          <select id="filterPriority" onchange="applyFilters()" class="w-full rounded-lg border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20">
            <option value="all">All Priorities</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
          <select id="filterCategory" onchange="applyFilters()" class="w-full rounded-lg border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20">
            <option value="all">All Categories</option>
          </select>
          <select id="filterStatus" onchange="applyFilters()" class="w-full rounded-lg border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20">
            <option value="all">All Status</option>
            <option value="todo">To Do</option>
            <option value="in-progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
          <div class="flex gap-2">
            <select id="sortBy" onchange="applyFilters()" class="flex-1 rounded-lg border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20">
              <option value="date">Due Date</option>
              <option value="priority">Priority</option>
              <option value="created">Created</option>
            </select>
            <button onclick="toggleSortOrder()" id="sortOrderBtn" class="px-3 py-2 rounded-lg border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-600 transition-colors">
              <i class="fa-solid fa-arrow-up" id="sortIcon"></i>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Kanban Board -->
    <section id="board" class="flex gap-6 overflow-x-auto pb-4 custom-scrollbar items-start"></section>
  </main>

  <!-- Task Modal -->
  <div id="taskModal" class="fixed inset-0 z-50 hidden">
    <div class="modal-overlay absolute inset-0" onclick="closeTaskModal()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-scale-in pointer-events-auto" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-slate-700">
          <h2 id="modalTitle" class="text-lg font-bold text-gray-900 dark:text-white">Create New Task</h2>
          <button onclick="closeTaskModal()" class="p-1 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors">
            <i class="fa-solid fa-xmark text-lg"></i>
          </button>
        </div>
        <form id="taskForm" onsubmit="handleTaskSubmit(event)" class="px-6 py-4 space-y-4">
          <input type="hidden" id="taskId">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Title</label>
            <input type="text" id="taskTitle" required placeholder="Enter task title..." 
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
            <textarea id="taskDesc" rows="3" placeholder="Describe the task..." 
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all resize-none"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Priority</label>
              <select id="taskPriority" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Status</label>
              <select id="taskStatus" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20">
                <option value="todo">To Do</option>
                <option value="in-progress">In Progress</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Due Date</label>
              <input type="date" id="taskDueDate" required 
                class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Category</label>
              <select id="taskCategory" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20">
                <option value="Design">Design</option>
                <option value="Development" selected>Development</option>
                <option value="Testing">Testing</option>
                <option value="Documentation">Documentation</option>
                <option value="Backend">Backend</option>
                <option value="Security">Security</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Color Label</label>
            <div class="flex gap-2 flex-wrap" id="colorPicker"></div>
          </div>
          <div class="flex justify-end gap-3 pt-2">
            <button type="button" onclick="closeTaskModal()" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 font-medium text-sm transition-colors">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg font-medium text-sm transition-colors">Save Task</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="fixed inset-0 z-50 hidden">
    <div class="modal-overlay absolute inset-0" onclick="closeConfirmModal()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-sm pointer-events-auto animate-scale-in text-center p-6">
        <div class="w-14 h-14 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4">
          <i class="fa-solid fa-triangle-exclamation text-red-600 dark:text-red-400 text-xl"></i>
        </div>
        <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Delete Task</h3>
        <p id="confirmMessage" class="text-gray-500 dark:text-gray-400 mb-6 text-sm">Are you sure you want to delete this task?</p>
        <div class="flex justify-center gap-3">
          <button onclick="closeConfirmModal()" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 font-medium text-sm transition-colors">Cancel</button>
          <button onclick="confirmDelete()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium text-sm transition-colors">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="importModal" class="fixed inset-0 z-50 hidden">
    <div class="modal-overlay absolute inset-0" onclick="closeImportModal()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg pointer-events-auto animate-scale-in">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-slate-700">
          <h2 class="text-lg font-bold text-gray-900 dark:text-white">Import Tasks</h2>
          <button onclick="closeImportModal()" class="p-1 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
            <i class="fa-solid fa-xmark text-lg"></i>
          </button>
        </div>
        <div class="px-6 py-4 space-y-4">
          <p class="text-sm text-gray-600 dark:text-gray-400">Paste your JSON data below. The format should be an array of task objects.</p>
          <textarea id="importJson" rows="10" placeholder='[{"title":"Example","description":"...",...}]' 
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm font-mono text-xs focus:outline-none focus:ring-2 focus:ring-primary-500/20 resize-none"></textarea>
          <div class="flex justify-end gap-3">
            <button onclick="closeImportModal()" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 font-medium text-sm transition-colors">Cancel</button>
            <button onclick="handleImport()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg font-medium text-sm transition-colors">Import</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

  <script>

// ============================================
// TASKFLOW KANBAN - VANILLA JS
// ============================================

// --- State ---
let tasks = JSON.parse(localStorage.getItem('taskflow-tasks')) || getSampleTasks();
let filters = { search: '', priority: 'all', category: 'all', status: 'all', sortBy: 'date', sortOrder: 'asc' };
let deleteTaskId = null;
let selectedColor = '#3b82f6';
let draggedTaskId = null;

const COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#ec4899','#06b6d4','#6366f1'];
const COLUMNS = ['todo', 'in-progress', 'completed'];
const STATUS_LABELS = { todo: 'To Do', 'in-progress': 'In Progress', completed: 'Completed' };
const PRIORITY_COLORS = { low: 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400', medium: 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400', high: 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400' };

// --- Helpers ---
function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
function formatDate(dateStr) {
  const d = new Date(dateStr), today = new Date(), tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate()+1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === tomorrow.toDateString()) return 'Tomorrow';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year: d.getFullYear() !== today.getFullYear() ? 'numeric' : undefined });
}
function isOverdue(dateStr) { const d = new Date(dateStr), t = new Date(); t.setHours(0,0,0,0); return d < t; }
function saveTasks() { localStorage.setItem('taskflow-tasks', JSON.stringify(tasks)); }
function getCategories() { const cats = new Set(tasks.map(t => t.category)); return ['all', ...Array.from(cats)]; }

function getSampleTasks() {
  const now = Date.now();
  return [
    { id: generateId(), title: 'Design System Architecture', description: 'Create a comprehensive design system including color palette, typography, and component library.', status: 'in-progress', priority: 'high', dueDate: new Date(now + 2*86400000).toISOString().split('T')[0], category: 'Design', createdAt: new Date(now-5*86400000).toISOString(), updatedAt: new Date().toISOString(), color: '#3b82f6' },
    { id: generateId(), title: 'API Integration', description: 'Integrate REST API endpoints for user authentication and data fetching.', status: 'todo', priority: 'high', dueDate: new Date(now + 5*86400000).toISOString().split('T')[0], category: 'Development', createdAt: new Date(now-3*86400000).toISOString(), updatedAt: new Date().toISOString(), color: '#8b5cf6' },
    { id: generateId(), title: 'Write Documentation', description: 'Document all API endpoints and deployment procedures.', status: 'todo', priority: 'medium', dueDate: new Date(now + 7*86400000).toISOString().split('T')[0], category: 'Documentation', createdAt: new Date(now-2*86400000).toISOString(), updatedAt: new Date().toISOString(), color: '#10b981' },
    { id: generateId(), title: 'User Testing', description: 'Conduct usability testing sessions with 5-10 users.', status: 'completed', priority: 'medium', dueDate: new Date(now - 1*86400000).toISOString().split('T')[0], category: 'Testing', createdAt: new Date(now-10*86400000).toISOString(), updatedAt: new Date().toISOString(), color: '#f59e0b' },
    { id: generateId(), title: 'Performance Optimization', description: 'Optimize bundle size and improve Core Web Vitals scores.', status: 'todo', priority: 'low', dueDate: new Date(now + 14*86400000).toISOString().split('T')[0], category: 'Development', createdAt: new Date(now-1*86400000).toISOString(), updatedAt: new Date().toISOString(), color: '#ef4444' },
    { id: generateId(), title: 'Database Schema Design', description: 'Design and implement the PostgreSQL database schema.', status: 'completed', priority: 'high', dueDate: new Date(now - 3*86400000).toISOString().split('T')[0], category: 'Backend', createdAt: new Date(now-15*86400000).toISOString(), updatedAt: new Date().toISOString(), color: '#6366f1' },
    { id: generateId(), title: 'Security Audit', description: 'Perform comprehensive security audit and penetration testing.', status: 'in-progress', priority: 'high', dueDate: new Date(now + 3*86400000).toISOString().split('T')[0], category: 'Security', createdAt: new Date(now-4*86400000).toISOString(), updatedAt: new Date().toISOString(), color: '#ec4899' },
    { id: generateId(), title: 'Mobile Responsive Design', description: 'Ensure all pages are fully responsive for mobile devices.', status: 'todo', priority: 'medium', dueDate: new Date(now + 6*86400000).toISOString().split('T')[0], category: 'Design', createdAt: new Date(now-2*86400000).toISOString(), updatedAt: new Date().toISOString(), color: '#06b6d4' },
  ];
}

// --- Theme ---
function initTheme() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === 'dark' || (!saved && prefersDark)) {
    document.documentElement.classList.add('dark');
  }
}
function toggleTheme() {
  const html = document.documentElement;
  html.classList.toggle('dark');
  localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
}

// --- Toasts ---
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const id = generateId();
  const colors = { success: 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800 text-green-800 dark:text-green-400', error: 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800 text-red-800 dark:text-red-400', info: 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800 text-blue-800 dark:text-blue-400' };
  const icons = { success: 'fa-check-circle', error: 'fa-circle-exclamation', info: 'fa-circle-info' };
  const el = document.createElement('div');
  el.className = `toast flex items-center gap-3 px-4 py-3 rounded-lg border shadow-lg ${colors[type]}`;
  el.innerHTML = `<i class="fa-solid ${icons[type]}"></i><p class="text-sm font-medium flex-1">${message}</p><button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- Stats ---
function renderStats() {
  const total = tasks.length;
  const completed = tasks.filter(t => t.status === 'completed').length;
  const inProgress = tasks.filter(t => t.status === 'in-progress').length;
  const pending = tasks.filter(t => t.status === 'todo').length;
  const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

  const stats = [
    { label: 'Total Tasks', value: total, icon: 'fa-list', color: 'bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400', border: 'border-blue-200 dark:border-blue-800/30' },
    { label: 'Completed', value: completed, icon: 'fa-check-circle', color: 'bg-green-50 text-green-600 dark:bg-green-900/20 dark:text-green-400', border: 'border-green-200 dark:border-green-800/30' },
    { label: 'In Progress', value: inProgress, icon: 'fa-spinner', color: 'bg-yellow-50 text-yellow-600 dark:bg-yellow-900/20 dark:text-yellow-400', border: 'border-yellow-200 dark:border-yellow-800/30' },
    { label: 'Pending', value: pending, icon: 'fa-clock', color: 'bg-gray-50 text-gray-600 dark:bg-slate-700/50 dark:text-gray-400', border: 'border-gray-200 dark:border-slate-600' },
    { label: 'Completion Rate', value: rate + '%', icon: 'fa-chart-line', color: 'bg-purple-50 text-purple-600 dark:bg-purple-900/20 dark:text-purple-400', border: 'border-purple-200 dark:border-purple-800/30' },
  ];

  document.getElementById('statsBar').innerHTML = stats.map((s, i) => `
    <div class="relative overflow-hidden rounded-xl border p-4 ${s.color} ${s.border} animate-slide-up" style="animation-delay:${i*0.1}s">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-xs font-medium opacity-80">${s.label}</p>
          <p class="text-2xl font-bold mt-1">${s.value}</p>
        </div>
        <div class="p-2 rounded-lg bg-white/50 dark:bg-black/20"><i class="fa-solid ${s.icon}"></i></div>
      </div>
      <div class="absolute -bottom-4 -right-4 w-16 h-16 rounded-full bg-current opacity-5"></div>
    </div>
  `).join('');
}

// --- Filters ---
function applyFilters() {
  filters.search = document.getElementById('searchInput').value.toLowerCase();
  filters.priority = document.getElementById('filterPriority').value;
  filters.category = document.getElementById('filterCategory').value;
  filters.status = document.getElementById('filterStatus').value;
  filters.sortBy = document.getElementById('sortBy').value;
  renderBoard();
  updateClearButton();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('mobileSearch').value = '';
  document.getElementById('filterPriority').value = 'all';
  document.getElementById('filterCategory').value = 'all';
  document.getElementById('filterStatus').value = 'all';
  document.getElementById('sortBy').value = 'date';
  filters = { search: '', priority: 'all', category: 'all', status: 'all', sortBy: 'date', sortOrder: 'asc' };
  document.getElementById('sortIcon').className = 'fa-solid fa-arrow-up';
  renderBoard();
  updateClearButton();
}

function toggleSortOrder() {
  filters.sortOrder = filters.sortOrder === 'asc' ? 'desc' : 'asc';
  document.getElementById('sortIcon').className = filters.sortOrder === 'asc' ? 'fa-solid fa-arrow-up' : 'fa-solid fa-arrow-down';
  renderBoard();
}

function updateClearButton() {
  const hasFilters = filters.priority !== 'all' || filters.category !== 'all' || filters.status !== 'all';
  document.getElementById('clearFiltersBtn').classList.toggle('hidden', !hasFilters);
}

function updateCategoryFilter() {
  const select = document.getElementById('filterCategory');
  const current = select.value;
  const cats = getCategories();
  select.innerHTML = cats.map(c => `<option value="${c}">${c === 'all' ? 'All Categories' : c}</option>`).join('');
  select.value = cats.includes(current) ? current : 'all';
}

function getFilteredTasks() {
  let result = tasks.filter(t => {
    const matchesSearch = !filters.search || t.title.toLowerCase().includes(filters.search) || t.description.toLowerCase().includes(filters.search);
    const matchesPriority = filters.priority === 'all' || t.priority === filters.priority;
    const matchesCategory = filters.category === 'all' || t.category === filters.category;
    const matchesStatus = filters.status === 'all' || t.status === filters.status;
    return matchesSearch && matchesPriority && matchesCategory && matchesStatus;
  });

  result.sort((a, b) => {
    let cmp = 0;
    if (filters.sortBy === 'priority') {
      const vals = { low: 1, medium: 2, high: 3 };
      cmp = vals[b.priority] - vals[a.priority];
    } else if (filters.sortBy === 'date') {
      cmp = new Date(a.dueDate) - new Date(b.dueDate);
    } else {
      cmp = new Date(a.createdAt) - new Date(b.createdAt);
    }
    return filters.sortOrder === 'asc' ? cmp : -cmp;
  });

  return result;
}

// --- Board Rendering ---
function renderBoard() {
  const filtered = getFilteredTasks();
  const board = document.getElementById('board');

  if (tasks.length === 0) {
    board.innerHTML = `
      <div class="w-full flex flex-col items-center justify-center py-16">
        <div class="w-24 h-24 rounded-2xl bg-primary-50 dark:bg-primary-900/20 flex items-center justify-center mb-6">
          <i class="fa-solid fa-clipboard text-4xl text-primary-500 dark:text-primary-400"></i>
        </div>
        <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2">No tasks found</h2>
        <p class="text-gray-500 dark:text-gray-400 text-center max-w-md mb-6">Get started by creating your first task.</p>
        <button onclick="openTaskModal()" class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white rounded-lg font-medium transition-colors">
          <i class="fa-solid fa-plus mr-2"></i> Create Your First Task
        </button>
      </div>`;
    return;
  }

  board.innerHTML = COLUMNS.map(status => {
    const colTasks = filtered.filter(t => t.status === status);
    const statusConfig = {
      todo: { bg: 'bg-gray-50/50 dark:bg-slate-800/50', border: 'border-gray-200 dark:border-slate-700', dot: 'bg-gray-400' },
      'in-progress': { bg: 'bg-blue-50/30 dark:bg-blue-900/10', border: 'border-blue-200 dark:border-blue-800/30', dot: 'bg-blue-500 animate-pulse' },
      completed: { bg: 'bg-green-50/30 dark:bg-green-900/10', border: 'border-green-200 dark:border-green-800/30', dot: 'bg-green-500' },
    };
    const cfg = statusConfig[status];

    return `
      <div class="flex flex-col h-full min-w-[300px] w-full md:w-[320px] lg:w-[360px]">
        <div class="flex items-center justify-between mb-3 px-1">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full ${cfg.dot}"></div>
            <h2 class="font-semibold text-gray-900 dark:text-white text-sm">${STATUS_LABELS[status]}</h2>
            <span class="bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-400 text-xs px-2 py-0.5 rounded-full font-medium">${colTasks.length}</span>
          </div>
          <button onclick="openTaskModal('${status}')" class="p-1.5 rounded-lg text-gray-400 hover:text-primary-600 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-colors">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        <div class="flex-1 rounded-xl border-2 border-dashed p-3 ${cfg.bg} ${cfg.border} column-drop custom-scrollbar overflow-y-auto max-h-[calc(100vh-320px)]"
          ondragover="handleDragOver(event, '${status}')" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${status}')">
          ${colTasks.length === 0 ? `
            <div class="flex flex-col items-center justify-center py-8 text-gray-400 dark:text-gray-500">
              <i class="fa-solid fa-inbox text-3xl mb-2 opacity-50"></i>
              <p class="text-sm">No tasks</p>
              <button onclick="openTaskModal('${status}')" class="mt-2 text-xs text-primary-600 dark:text-primary-400 hover:underline">Add a task</button>
            </div>
          ` : colTasks.map(task => renderTaskCard(task)).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderTaskCard(task) {
  const overdue = isOverdue(task.dueDate) && task.status !== 'completed';
  const priorityClass = PRIORITY_COLORS[task.priority];

  return `
    <div class="task-card relative bg-white dark:bg-slate-800 rounded-xl p-4 border border-gray-200 dark:border-slate-700 shadow-sm hover:shadow-md mb-3 group"
      draggable="true" ondragstart="handleDragStart(event, '${task.id}')" ondragend="handleDragEnd(event)">
      <div class="absolute left-0 top-4 bottom-4 w-1 rounded-r-full" style="background-color:${task.color || '#3b82f6'}"></div>
      <div class="pl-3">
        <div class="flex items-start justify-between mb-2">
          <h3 class="font-semibold text-gray-900 dark:text-white text-sm leading-tight flex-1 pr-2">${escapeHtml(task.title)}</h3>
          <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="editTask('${task.id}')" class="p-1.5 rounded-lg text-gray-400 hover:text-primary-600 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-colors">
              <i class="fa-solid fa-pen text-xs"></i>
            </button>
            <button onclick="deleteTask('${task.id}')" class="p-1.5 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
              <i class="fa-solid fa-trash text-xs"></i>
            </button>
          </div>
        </div>
        <p class="text-xs text-gray-500 dark:text-gray-400 mb-3 line-clamp-2">${escapeHtml(task.description)}</p>
        <div class="flex items-center gap-2 flex-wrap mb-2">
          <span class="px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase ${priorityClass}">${task.priority}</span>
          <span class="px-2 py-0.5 rounded-md text-[10px] font-medium bg-primary-100 text-primary-700 dark:bg-primary-900/30 dark:text-primary-400">${task.category}</span>
        </div>
        <div class="flex items-center gap-1.5 text-xs ${overdue ? 'text-red-500 dark:text-red-400 font-medium' : 'text-gray-400 dark:text-gray-500'}">
          <i class="fa-regular fa-calendar"></i>
          <span>${formatDate(task.dueDate)}</span>
          ${overdue ? '<span class="text-[10px]">(Overdue)</span>' : ''}
        </div>
        <div class="flex items-center gap-1.5 mt-1 text-[10px] text-gray-400 dark:text-gray-600">
          <i class="fa-regular fa-clock"></i>
          <span>${new Date(task.createdAt).toLocaleDateString()}</span>
        </div>
      </div>
    </div>`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// --- Drag & Drop ---
function handleDragStart(e, taskId) {
  draggedTaskId = taskId;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskId);
}

function handleDragEnd(e) {
  e.target.classList.remove('dragging');
  draggedTaskId = null;
  document.querySelectorAll('.column-drop').forEach(col => col.classList.remove('drag-over'));
}

function handleDragOver(e, status) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function handleDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function handleDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const taskId = e.dataTransfer.getData('text/plain') || draggedTaskId;
  if (!taskId) return;

  const task = tasks.find(t => t.id === taskId);
  if (task && task.status !== newStatus) {
    task.status = newStatus;
    task.updatedAt = new Date().toISOString();
    saveTasks();
    renderBoard();
    renderStats();
    showToast(`Task moved to ${STATUS_LABELS[newStatus]}`, 'success');
  }
}

// --- Task CRUD ---
function openTaskModal(status = 'todo') {
  document.getElementById('taskId').value = '';
  document.getElementById('modalTitle').textContent = 'Create New Task';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskPriority').value = 'medium';
  document.getElementById('taskStatus').value = status;
  document.getElementById('taskDueDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('taskCategory').value = 'Development';
  selectedColor = '#3b82f6';
  renderColorPicker();
  document.getElementById('taskModal').classList.remove('hidden');
}

function editTask(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  document.getElementById('taskId').value = task.id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('taskTitle').value = task.title;
  document.getElementById('taskDesc').value = task.description;
  document.getElementById('taskPriority').value = task.priority;
  document.getElementById('taskStatus').value = task.status;
  document.getElementById('taskDueDate').value = task.dueDate;
  document.getElementById('taskCategory').value = task.category;
  selectedColor = task.color || '#3b82f6';
  renderColorPicker();
  document.getElementById('taskModal').classList.remove('hidden');
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.add('hidden');
}

function handleTaskSubmit(e) {
  e.preventDefault();
  const id = document.getElementById('taskId').value;
  const data = {
    title: document.getElementById('taskTitle').value.trim(),
    description: document.getElementById('taskDesc').value.trim(),
    priority: document.getElementById('taskPriority').value,
    status: document.getElementById('taskStatus').value,
    dueDate: document.getElementById('taskDueDate').value,
    category: document.getElementById('taskCategory').value,
    color: selectedColor,
  };

  if (!data.title) return;

  if (id) {
    const task = tasks.find(t => t.id === id);
    Object.assign(task, data, { updatedAt: new Date().toISOString() });
    showToast('Task updated successfully', 'success');
  } else {
    tasks.push({ ...data, id: generateId(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
    showToast('Task created successfully', 'success');
  }

  saveTasks();
  renderBoard();
  renderStats();
  updateCategoryFilter();
  closeTaskModal();
}

function deleteTask(taskId) {
  deleteTaskId = taskId;
  const task = tasks.find(t => t.id === taskId);
  document.getElementById('confirmMessage').textContent = `Are you sure you want to delete "${task.title}"? This cannot be undone.`;
  document.getElementById('confirmModal').classList.remove('hidden');
}

function closeConfirmModal() {
  document.getElementById('confirmModal').classList.add('hidden');
  deleteTaskId = null;
}

function confirmDelete() {
  if (deleteTaskId) {
    tasks = tasks.filter(t => t.id !== deleteTaskId);
    saveTasks();
    renderBoard();
    renderStats();
    updateCategoryFilter();
    showToast('Task deleted successfully', 'info');
  }
  closeConfirmModal();
}

// --- Color Picker ---
function renderColorPicker() {
  document.getElementById('colorPicker').innerHTML = COLORS.map(c => `
    <button type="button" onclick="selectColor('${c}')" 
      class="w-8 h-8 rounded-full transition-all duration-200 ${selectedColor === c ? 'ring-2 ring-offset-2 ring-gray-400 dark:ring-offset-slate-800 scale-110' : 'hover:scale-105'}"
      style="background-color:${c}"></button>
  `).join('');
}

function selectColor(color) {
  selectedColor = color;
  renderColorPicker();
}

// --- Import/Export ---
function exportTasks() {
  const data = JSON.stringify(tasks, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `taskflow-tasks-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Tasks exported successfully', 'success');
}

function importTasks(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (Array.isArray(parsed)) {
        tasks = parsed.map(t => ({ ...t, id: t.id || generateId(), createdAt: t.createdAt || new Date().toISOString(), updatedAt: new Date().toISOString() }));
        saveTasks();
        renderBoard();
        renderStats();
        updateCategoryFilter();
        showToast('Tasks imported successfully', 'success');
      }
    } catch {
      showToast('Invalid JSON format', 'error');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function openImportModal() {
  document.getElementById('importModal').classList.remove('hidden');
}

function closeImportModal() {
  document.getElementById('importModal').classList.add('hidden');
  document.getElementById('importJson').value = '';
}

function handleImport() {
  try {
    const parsed = JSON.parse(document.getElementById('importJson').value);
    if (Array.isArray(parsed)) {
      tasks = parsed.map(t => ({ ...t, id: t.id || generateId(), createdAt: t.createdAt || new Date().toISOString(), updatedAt: new Date().toISOString() }));
      saveTasks();
      renderBoard();
      renderStats();
      updateCategoryFilter();
      showToast('Tasks imported successfully', 'success');
      closeImportModal();
    }
  } catch {
    showToast('Invalid JSON format', 'error');
  }
}

// --- Event Listeners ---
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('mobileSearch').addEventListener('input', () => {
  document.getElementById('searchInput').value = document.getElementById('mobileSearch').value;
  applyFilters();
});

// Close modals on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeTaskModal();
    closeConfirmModal();
    closeImportModal();
  }
});

// --- Init ---
initTheme();
renderStats();
renderBoard();
updateCategoryFilter();
renderColorPicker();

  </script>
</body>
</html>
